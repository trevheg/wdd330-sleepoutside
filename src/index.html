<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    
  </head>

  <body>
    <header class="divider" id="main-header">

    </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <section class="category">
        <ul class="category-list">
          <li class="category-card">
            <a href="/product_listing/index.html?category=tents">
              <img
                src="/images/icons/category-tents.svg"
                alt="tent icon"
              />
              <h2 class="category__name">Tents</h2>
            </a>
          </li>
          <li class="category-card">
            <a href="/product_listing/index.html?category=backpacks">
              <img
                src="/images/icons/category-backpacks.svg"
                alt="backpacks icon"
              />
              <h2 class="category__name">Backpacks</h2>
            </a>
          </li>
          <li class="category-card">
            <a href="/product_listing/index.html?category=sleeping-bags">
              <img
                src="/images/icons/category-sleepingbags.svg"
                alt="sleeping bags icon"
              />
              <h2 class="category__name">Sleeping Bags</h2>
            </a>
          </li>
          <li class="category-card">
            <a href="/product_listing/index.html?category=hammocks">
              <img
                src="/images/icons/category-hammocks.svg"
                alt="hammocks icon"
              />
              <h2 class="category__name">Hammocks</h2>
            </a>
          </li>
        </ul>
      </section>
    </main>
    <footer id="main-footer"></footer>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
